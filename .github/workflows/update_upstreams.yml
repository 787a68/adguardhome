name: Update Upstreams

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一自动运行
  push:
    branches: [main]
    paths:
      - .github/workflows/**  # 当该目录下文件更新时触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build upstreams file
        run: |
          FILE="upstreams.txt"
          # 清空输出文件
          > "$FILE"
          
          # 定义有序数组，每个元素记录一个远程规则及对应上游 DNS，使用 "|" 分隔
          ordered_rules=(
            "https://raw.githubusercontent.com/gfwlist/gfwlist/master/list.txt|h3://dns.google/dns-query"
            "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/alibaba.conf|h3://dns.alidns.com/dns-query"
            "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/bytedance.conf|180.184.1.1"
            "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/baidu.conf|180.76.76.76"
            "https://ruleset.skk.moe/Modules/Rules/sukka_local_dns_mapping/qihoo360.conf|tls://dot.360.cn"
          )
          
          # 按照数组中定义的顺序遍历
          for rule in "${ordered_rules[@]}"; do
            # 分离 URL 与上游 DNS（delimiter 为 "|"）
            url="${rule%%|*}"
            upstream="${rule#*|}"
            tmp=$(mktemp)
            echo "Downloading $url ..."
            curl -s "$url" > "$tmp"
            
            # 如果 URL 包含 gfwlist，则按照 gfwlist 规则处理
            if [[ "$url" == *"gfwlist"* ]]; then
              while IFS= read -r line; do
                # 去除首尾空白字符
                line_clean=$(echo "$line" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                # 跳过空行以及以 "!" 或 "@" 开头的注释/白名单规则
                if [[ -z "$line_clean" || "$line_clean" == "!"* || "$line_clean" == "@"* ]]; then
                  continue
                fi
                # 如果以 "[" 开头或者包含 "AutoProxy"（不区分大小写），则跳过该行
                if [[ "$line_clean" =~ ^\[ ]] || echo "$line_clean" | grep -qi "autoproxy"; then
                  continue
                fi
                # 去除开头的 "||" 或 "."
                line_clean=$(echo "$line_clean" | sed -E 's/^(\|\||\.)//')
                # 提取域名：如果以 "http" 开头则提取主机名；否则如果包含 "/" 则取第一个 "/" 前的部分，否则直接使用该行
                if [[ "$line_clean" == http* ]]; then
                  domain=$(echo "$line_clean" | sed -E 's#^https?://##; s#/.*##')
                elif [[ "$line_clean" == *"/"* ]]; then
                  domain=$(echo "$line_clean" | cut -d'/' -f1)
                else
                  domain="$line_clean"
                fi
                # 去除域名尾部可能出现的 "%2F"（不区分大小写）和多余的 "/"
                domain=$(echo "$domain" | sed -E 's/(%2F)+$//Ig; s#/$##')
                # 若提取结果不含"."，则跳过
                if [[ "$domain" != *.* ]]; then
                  continue
                fi
                # 检测是否为纯 IP 地址（可选端口），如果是则跳过
                if [[ "$domain" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(:[0-9]+)?$ ]]; then
                  continue
                fi
                echo "[/${domain}/]${upstream}" >> "$FILE"
              done < "$tmp"
            else
              # 对于非 gfwlist 的规则（例如 Surge 规则），只解析以 DOMAIN-SUFFIX, 或 DOMAIN, 开头的行
              grep -E '^(DOMAIN-SUFFIX|DOMAIN),' "$tmp" | while IFS= read -r l; do
                raw=$(echo "$l" | sed -E 's/^(DOMAIN-SUFFIX|DOMAIN),//' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
                if [[ "$raw" == *"/"* ]]; then
                  dom=$(echo "$raw" | cut -d'/' -f1)
                else
                  dom="$raw"
                fi
                # 跳过包含伪规则关键字的
                if [[ "$dom" == *"ruleset.skk.moe"* ]]; then
                  continue
                fi
                if [[ "$dom" != *.* ]]; then
                  continue
                fi
                # 同样，检测纯 IP 地址（可选端口）避免输出 IP 规则
                if [[ "$dom" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(:[0-9]+)?$ ]]; then
                  continue
                fi
                echo "[/${dom}/]${upstream}" >> "$FILE"
              done
            fi
          done
          
          # 删除所有空行
          sed -i '/^$/d' "$FILE"
          # 去重但保持原有顺序（保留第一次出现的行）
          awk '!seen[$0]++' "$FILE" > tmp && mv tmp "$FILE"
          # 删除文件末尾的换行符
          perl -pi -e 'chomp if eof' "$FILE"
          
          echo "Final upstreams file:"
          cat "$FILE"

      - name: Commit & Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add upstreams.txt
          if ! git diff --cached --quiet; then
              git commit -m "Update upstreams file"
              git push
          else
              echo "No changes to commit."
          fi